<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: #1e2a38;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 Phishing Detector</h2>
    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL" required>
        <br>
        <button type="submit">Check</button>
    </form>

    <div class="result">
        {{ result }}
    </div>
</div>

</body>
</html>
